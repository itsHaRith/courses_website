<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة كورسات برمجة - تسجيل الدخول</title>
    <link rel="stylesheet" href="style.css?v=1.0.1">
    <link rel="stylesheet" href="responsive.css?v=1.0.1">
</head>
<body>
    <div class="scroll-progress" id="scroll-progress"></div>
    <header>
        <nav class="navbar">
            <a href="index.html" class="logo">CodeCourses</a>
            <ul class="nav-links">
                <li><a href="index.html">الرئيسية</a></li>
                <li><a href="courses.html">الكورسات</a></li>
                <li><a href="about.html">من نحن</a></li>
            </ul>
            <button class="mobile-menu-btn" id="mobile-menu-btn">
                <svg viewBox="0 0 24 24" width="28" height="28" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
        </nav>
    </header>

    <div class="mobile-overlay" id="mobile-overlay"></div>
    <aside class="mobile-sidebar" id="mobile-sidebar">
        <button class="close-mobile-menu" id="close-mobile-menu">×</button>
        <ul class="mobile-nav-links">
            <li><a href="index.html">الرئيسية</a></li>
            <li><a href="courses.html">الكورسات</a></li>
            <li><a href="about.html">من نحن</a></li>
            <li><a href="login.html" class="auth-link">تسجيل الدخول</a></li>
        </ul>
    </aside>

    <section class="login-section">
        <div class="bg-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
        </div>
        <div class="glass-card" id="login-card">
            <h2 style="margin-bottom: 0.5rem;">مرحباً بعودتك</h2>
            <p style="color: #cbd5e1; margin-bottom: 2rem;">سجل الدخول لمتابعة رحلتك التعليمية</p>
            <form onsubmit="handleLogin(event)">
                <div class="form-group floating-group">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                        <polyline points="22,6 12,13 2,6"></polyline>
                    </svg>
                    <input type="email" id="email" value="admin@gmail.com" required placeholder=" ">
                    <label for="email">البريد الإلكتروني</label>
                </div>
                <div class="form-group floating-group">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    <input type="password" id="password" value="admin" required placeholder=" ">
                    <label for="password">كلمة المرور</label>
                </div>
                
                <div class="login-options">
                    <label class="remember-me">
                        <input type="checkbox">
                        <span class="checkmark"></span>
                        تذكرني
                    </label>
                    <a href="#" class="forgot-pass">نسيت كلمة المرور؟</a>
                </div>

                <button type="submit" class="btn btn-large btn-gradient" style="width: 100%;">تسجيل الدخول</button>
            </form>
            <div class="register-link">
                <p>ليس لديك حساب؟ <a href="#">سجل الآن مجاناً</a></p>
            </div>
        </div>
    </section>

    <div class="floating-controls">
        <button class="control-btn" id="lang-toggle">EN</button>
        <button class="control-btn" id="theme-toggle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </button>
        <button class="control-btn back-to-top" id="back-to-top">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
        </button>
    </div>

    <script src="script.js?v=1.0.1"></script>
</body>
</html>
